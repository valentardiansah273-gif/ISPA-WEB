<!DOCTYPE html>
<html>
<head>
<title>Register - BreathSafe</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(to right, #00c6ff, #0072ff);
    color: white;
}

/* NAVBAR */
.navbar {
    background: rgba(0,0,0,0.4) !important;
    backdrop-filter: blur(10px);
}

/* LOGO */
.logo-img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border: none;
    border-radius: 15px;
    animation: fadeIn 0.7s ease;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity:0; transform: translateY(30px);}
    to {opacity:1; transform: translateY(0);}
}

.btn-custom {
    border-radius: 30px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-4">
    <a class="navbar-brand d-flex align-items-center" href="/">
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo-img me-2">
        <b>BreathSafe</b>
    </a>

    <a href="/" class="btn btn-outline-light btn-sm">Home</a>
</nav>

<!-- FORM -->
<div class="container mt-5">
<div class="card p-4 col-md-4 mx-auto shadow">

<h3 class="text-center">Register</h3>

<form method="post">
<input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
<input type="password" name="password" class="form-control mb-3" placeholder="Password" required>

<button class="btn btn-success w-100 btn-custom">Register</button>
</form>

<p class="mt-3 text-center">
Sudah punya akun? <a href="/login" class="text-warning">Login</a>
</p>

</div>
</div>

</body>
</html>
