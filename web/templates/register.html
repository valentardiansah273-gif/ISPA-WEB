<!DOCTYPE html>
<html>
<head>
<title>Register - BreathSafe</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(to right, #00c6ff, #0072ff);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border: none;
    border-radius: 15px;
    width: 100%;
    max-width: 400px;
    animation: fadeIn 0.7s ease;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity:0; transform: translateY(30px);}
    to {opacity:1; transform: translateY(0);}
}

.input-group-text {
    cursor: pointer;
}

.progress {
    background: rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="card p-4 shadow text-white">

<h3 class="text-center mb-3">Register</h3>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="post">

<!-- USERNAME -->
<input type="text" name="username" class="form-control mb-3" placeholder="Username" required>

<!-- PASSWORD -->
<div class="input-group mb-2">
<input type="password" name="password" id="password" class="form-control" placeholder="Password" required onkeyup="checkStrength()">
<span class="input-group-text" onclick="togglePassword('password')">
<i class="bi bi-eye"></i>
</span>
</div>

<!-- 🔥 STRENGTH BAR -->
<div class="progress mb-2" style="height: 6px;">
<div id="strength-bar" class="progress-bar" style="width: 0%"></div>
</div>

<small id="strength-text" class="text-light"></small>

<!-- CONFIRM PASSWORD -->
<div class="input-group mt-3 mb-3">
<input type="password" name="confirm_password" id="confirm_password" class="form-control" placeholder="Konfirmasi Password" required>
<span class="input-group-text" onclick="togglePassword('confirm_password')">
<i class="bi bi-eye"></i>
</span>
</div>

<!-- INFO -->
<small class="text-light">
Gunakan minimal 8 karakter dengan kombinasi huruf besar, huruf kecil, dan angka untuk keamanan yang lebih baik.
</small>

<button class="btn btn-success w-100 mt-3" id="register-btn">Register</button>

</form>

<p class="mt-3 text-center">
Sudah punya akun? <a href="/login" class="text-warning">Login</a>
</p>

</div>

<script>
function togglePassword(id) {
    let pass = document.getElementById(id);
    pass.type = pass.type === "password" ? "text" : "password";
}

function checkStrength() {
    let password = document.getElementById("password").value;
    let bar = document.getElementById("strength-bar");
    let text = document.getElementById("strength-text");
    let btn = document.getElementById("register-btn");

    let strength = 0;

    if (password.length >= 8) strength++;
    if (/[A-Z]/.test(password)) strength++;
    if (/[a-z]/.test(password)) strength++;
    if (/[0-9]/.test(password)) strength++;
    if (/[^A-Za-z0-9]/.test(password)) strength++;

    if (password.length === 0) {
        bar.style.width = "0%";
        text.innerHTML = "";
        btn.disabled = true;
        return;
    }

    if (strength <= 2) {
        bar.style.width = "33%";
        bar.className = "progress-bar bg-danger";
        text.innerHTML = "Password lemah";
        btn.disabled = true;
    } else if (strength <= 4) {
        bar.style.width = "66%";
        bar.className = "progress-bar bg-warning";
        text.innerHTML = "Password sedang";
        btn.disabled = false;
    } else {
        bar.style.width = "100%";
        bar.className = "progress-bar bg-success";
        text.innerHTML = "Password kuat";
        btn.disabled = false;
    }
}
</script>

</body>
</html>
