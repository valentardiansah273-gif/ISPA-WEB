<div class="container mt-5">
    <div class="card p-4 col-md-4 mx-auto shadow">

```
    <h3 class="text-center mb-3">Register</h3>

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="post" onsubmit="return validateForm()">

        <input 
            type="text" 
            name="username" 
            class="form-control mb-3" 
            placeholder="Username (min 4 karakter)" 
            required
        >

        <div class="password-wrapper mb-2">
            <input 
                type="password" 
                id="password" 
                name="password" 
                class="form-control" 
                placeholder="Password" 
                required
            >
            <i class="bi bi-eye-slash eye-icon" onclick="togglePassword('password', this)"></i>
        </div>

        <div class="password-wrapper mb-2">
            <input 
                type="password" 
                id="confirm" 
                name="confirm_password" 
                class="form-control" 
                placeholder="Konfirmasi Password" 
                required
            >
            <i class="bi bi-eye-slash eye-icon" onclick="togglePassword('confirm', this)"></i>
        </div>

        <div class="hint mb-3">
            Password minimal 8 karakter, harus ada huruf besar, huruf kecil, dan angka.
        </div>

        <button class="btn btn-success w-100">Register</button>
    </form>

    <p class="mt-3 text-center">
        Sudah punya akun? 
        <a href="/login" class="text-warning">Login</a>
    </p>

</div>
```

</div>

<script>
function togglePassword(id, el) {
    const input = document.getElementById(id);

    if (input.type === "password") {
        input.type = "text";
        el.classList.replace("bi-eye-slash", "bi-eye");
    } else {
        input.type = "password";
        el.classList.replace("bi-eye", "bi-eye-slash");
    }
}

function validateForm() {
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirm").value;

    const strongPassword = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;

    if (!strongPassword.test(password)) {
        alert("Password harus kuat (8+ karakter, huruf besar, kecil, angka)");
        return false;
    }

    if (password !== confirm) {
        alert("Konfirmasi password tidak cocok");
        return false;
    }

    return true;
}
</script>
