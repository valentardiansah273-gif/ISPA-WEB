<!DOCTYPE html>
<html>
<head>
<title>Register - BreathSafe</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(to right, #00c6ff, #0072ff);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border: none;
    border-radius: 15px;
    width: 100%;
    max-width: 400px;
}

/* INPUT ICON */
.input-group-text {
    cursor: pointer;
}
</style>
</head>

<body>

<div class="card p-4 shadow text-white">

<h3 class="text-center mb-3">Register</h3>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="post">

<input type="text" name="username" class="form-control mb-3" placeholder="Username" required>

<div class="input-group mb-3">
<input type="password" name="password" id="password" class="form-control" placeholder="Password" required>
<span class="input-group-text" onclick="togglePassword('password')">
<i class="bi bi-eye"></i>
</span>
</div>

<div class="input-group mb-3">
<input type="password" name="confirm_password" id="confirm_password" class="form-control" placeholder="Konfirmasi Password" required>
<span class="input-group-text" onclick="togglePassword('confirm_password')">
<i class="bi bi-eye"></i>
</span>
</div>

<small class="text-light">
Minimal 6 karakter, huruf besar, kecil, dan angka
</small>

<button class="btn btn-success w-100 mt-3">Register</button>
</form>

<p class="mt-3 text-center">
Sudah punya akun? <a href="/login" class="text-warning">Login</a>
</p>

</div>

<script>
function togglePassword(id) {
    let pass = document.getElementById(id);
    pass.type = pass.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
