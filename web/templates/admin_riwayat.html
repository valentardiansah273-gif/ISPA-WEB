<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Riwayat Semua Pengguna - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/admin/dashboard">Admin Panel</a>
    </div>
</nav>

<div class="container">
    <div class="card shadow p-4">
        <h3>Semua Riwayat Prediksi</h3>
        <table class="table table-hover mt-3">
            <thead class="table-dark">
                <tr>
                    <th>User</th>
                    <th>Nama Pasien</th>
                    <th>Hasil</th>
                    <th>Persentase</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody>
                {% for item in riwayat %}
                <tr>
                    <td>{{ item.username }}</td>
                    <td>{{ item.nama }}</td>
                    <td>
                        {% if item.hasil == 'ISPA' %}
                            <span class="badge bg-danger">ISPA</span>
                        {% else %}
                            <span class="badge bg-success">Tidak ISPA</span>
                        {% endif %}
                    </td>
                    <td>{{ item.persen }}%</td>
                    <td>
                        <a href="/detail/{{ item.id }}" class="btn btn-sm btn-info">Detail</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="/admin/dashboard" class="btn btn-secondary mt-3">Kembali ke Dashboard</a>
    </div>
</div>

</body>
</html>
