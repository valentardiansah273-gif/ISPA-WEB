<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Hasil Prediksi</title>

<style>
* { box-sizing: border-box; }

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    margin: 0;
}

.container {
    width: 90%;
    max-width: 420px;
    margin: 60px auto;
    background: white;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.nama {
    margin-bottom: 15px;
    color: #555;
}

/* 🔵 CIRCLE */
.circle {
    position: relative;
    width: 180px;
    height: 180px;
    margin: 20px auto;
}

.circle svg {
    transform: rotate(-90deg);
}

.circle circle {
    fill: none;
    stroke-width: 12;
    stroke-linecap: round;
}

.bg { stroke: #eee; }

.progress {
    stroke-dasharray: 440;
    stroke-dashoffset: 440;
}

.value {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 30px;
    font-weight: bold;
}

/* STATUS */
.status {
    font-size: 20px;
    margin-top: 10px;
    font-weight: bold;
}

.info {
    font-size: 14px;
    margin-top: 5px;
}

/* SARAN */
.saran {
    text-align: left;
    margin-top: 15px;
    padding: 15px;
    border-radius: 12px;
    background: #f5f5f5;
    font-size: 14px;
}

/* BUTTON */
.btn {
    display: block;
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
}

.btn-home { background: #28a745; }
.btn-history { background: #333; }
</style>

</head>
<body>

<div class="container">
    <h2>🩺 Hasil Prediksi</h2>

    <!-- ✅ FIX NAMA (ambil dari Flask dulu, fallback ke session) -->
    <div class="nama">
    Pasien: <b>{{ nama if nama else session.get('username', 'User') }}</b><br>
    Umur: <b>{{ umur }}</b> tahun
    </div>

    <!-- 🔵 CIRCLE -->
    <div class="circle">
        <svg width="180" height="180">
            <circle cx="90" cy="90" r="70" class="bg"></circle>
            <circle cx="90" cy="90" r="70" class="progress" id="progressCircle"></circle>
        </svg>
        <div class="value" id="percentText">0%</div>
    </div>

    <div class="status" id="statusText"></div>
    <div class="info" id="infoText"></div>

    <div class="saran" id="saranBox"></div>

    <a href="/" class="btn btn-home">🏠 Home</a>
    <a href="/riwayat" class="btn btn-history">📊 Riwayat</a>
</div>

<script>

/* ✅ FIX: pastikan persen selalu angka */
let persen = Number({{ persen | default(0) }});

let circle = document.getElementById("progressCircle");
let text = document.getElementById("percentText");
let statusText = document.getElementById("statusText");
let infoText = document.getElementById("infoText");
let saranBox = document.getElementById("saranBox");

let radius = 70;
let keliling = 2 * Math.PI * radius;

circle.style.strokeDasharray = keliling;
circle.style.strokeDashoffset = keliling;

let warna, status, info, saran;

/* 🔥 LEVEL LOGIC */
if (persen <= 40) {
    warna = "#28a745";
    status = "🟢 Aman";
    info = "Risiko rendah";
    saran = `
        <b>💡 Saran:</b>
        <ul>
            <li>Jaga pola hidup sehat</li>
            <li>Istirahat cukup</li>
            <li>Makan bergizi</li>
        </ul>`;
}
else if (persen <= 70) {
    warna = "#ffc107";
    status = "🟡 Waspada";
    info = "Perhatikan kondisi tubuh";
    saran = `
        <b>⚠️ Saran:</b>
        <ul>
            <li>Kurangi aktivitas berat</li>
            <li>Perbanyak minum air</li>
            <li>Jika berlanjut, periksa dokter</li>
        </ul>`;
}
else {
    warna = "#ff2e2e";
    status = "🔴 Risiko Tinggi ISPA";
    info = "Segera ke dokter";
    saran = `
        <b>🩺 Saran:</b>
        <ul>
            <li>Segera ke fasilitas kesehatan</li>
            <li>Istirahat total</li>
            <li>Pakai masker</li>
        </ul>`;
}

/* 🎯 ANIMASI */
let offset = keliling - (persen / 100) * keliling;

circle.style.stroke = warna;
circle.style.transition = "stroke-dashoffset 1s ease";
circle.style.strokeDashoffset = offset;

/* 🎯 TEXT */
text.innerHTML = persen + "%";
statusText.innerHTML = status;
infoText.innerHTML = info;
saranBox.innerHTML = saran;

</script>

</body>
</html>
