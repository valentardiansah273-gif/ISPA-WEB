<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <nav class="col-md-2 d-md-block bg-dark sidebar vh-100" style="color: white; padding: 20px;">
            <h4>Admin Panel</h4>
            <hr>
            <ul class="nav flex-column">
                <li class="nav-item mb-2"><a href="/admin/dashboard" class="nav-link text-white">Riwayat Semua</a></li>
                <li class="nav-item mb-2"><a href="/admin/users" class="nav-link text-white">Manajemen User</a></li>
                <li class="nav-item mb-2"><a href="/admin/statistik" class="nav-link text-white">Statistik & Analisis</a></li>
                <li class="nav-item mb-2"><a href="/admin/export" class="nav-link text-white">Export Data</a></li>
            </ul>
            <hr>
            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </nav>

        <!-- Main Content -->
        <main class="col-md-10 ms-sm-auto px-md-4 py-4">
            {% block content %}
            <h2>Selamat Datang, Admin</h2>
            <p>Silakan pilih menu di samping untuk mengelola sistem.</p>
            {% endblock %}
        </main>
    </div>
</div>
</body>
</html>
