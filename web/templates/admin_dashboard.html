<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <!-- Anda bisa tambahkan link CSS Bootstrap di sini -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Dashboard Admin - Riwayat Analisis</h2>
        <a href="/logout" class="btn btn-danger">Logout</a>
    </div>

    <div class="card p-4">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nama Pasien</th>
                    <th>Umur</th>
                    <th>Hasil Diagnosis</th>
                    <th>Persentase</th>
                    <th>Tanggal</th>
                </tr>
            </thead>
            <tbody>
                <!-- Loop ini mengambil variabel 'riwayat' yang dikirim dari app.py -->
                {% for item in riwayat %}
                <tr>
                    <td>{{ item.id }}</td>
                    <td>{{ item.nama }}</td>
                    <td>{{ item.umur }}</td>
                    <td>{{ item.hasil }}</td>
                    <td>{{ item.persen }}%</td>
                    <td>{{ item.created_at }}</td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="6" class="text-center">Belum ada data riwayat.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
