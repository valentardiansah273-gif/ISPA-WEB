<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <!-- Bootstrap 5 & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .sidebar { background: #2c3e50; min-height: 100vh; color: white; transition: 0.3s; }
        .nav-link { color: #bdc3c7; padding: 15px 20px; transition: 0.3s; }
        .nav-link:hover { background: #34495e; color: white; border-left: 4px solid #3498db; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-light">

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <nav class="col-md-2 d-none d-md-block sidebar">
            <div class="p-3 text-center">
                <i class="bi bi-shield-lock-fill" style="font-size: 2rem; color: #3498db;"></i>
                <h5 class="mt-2">Admin Panel</h5>
            </div>
            <hr>
<ul class="nav flex-column">
        <a href="/admin/riwayat" class="nav-link"><i class="bi bi-clock-history"></i> Riwayat Prediksi</a>
    </li>
    <li class="nav-item">
        <a href="/admin/users" class="nav-link"><i class="bi bi-people"></i> Manajemen User</a>
    </li>
    <li class="nav-item">
        <a href="/admin/statistik" class="nav-link"><i class="bi bi-graph-up"></i> Statistik</a>
    </li>
    <li class="nav-item">
        <a href="/admin/export" class="nav-link"><i class="bi bi-file-earmark-arrow-down"></i> Export Data</a>
    </li>
</ul>
        </nav>

        <!-- Main Content -->
        <main class="col-md-10 ms-sm-auto px-md-4 py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold">Selamat Datang, Admin</h2>
                <!-- Tombol Back to Home -->
                <a href="/" class="btn btn-outline-primary shadow-sm">
                    <i class="bi bi-arrow-left"></i> Kembali ke Home
                </a>
            </div>

            {% block content %}
            <div class="row">
                <div class="col-md-12">
                    <div class="card p-5 text-center">
                        <i class="bi bi-layout-text-window-reverse" style="font-size: 3rem; color: #ccc;"></i>
                        <h4 class="mt-3">Pilih menu dari sidebar untuk mengelola sistem</h4>
                        <p class="text-muted">Akses penuh diberikan untuk memantau data dan user</p>
                    </div>
                </div>
            </div>
            {% endblock %}
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
