{% extends 'admin_dashboard.html' %}

{% block content %}
<div class="card p-4">
    <h3>Data Pengguna</h3>
    <table class="table table-hover">
        <thead>
            <tr><th>Username</th><th>Status</th><th>Aksi</th></tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user.username }}</td>
                <td>{{ "Aktif" if user.is_active else "Blokir" }}</td>
                <td><form action="/admin/toggle_user/{{ user.username }}" method="POST"><button class="btn btn-sm btn-warning">Toggle</button></form></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
