{% extends 'admin_dashboard.html' %}
{% block content %}
<div class="card p-4">
    <h3>Daftar Pengguna</h3>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Username</th>
                <th>Role</th>
                <th>Status</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user.username }}</td>
                <td>{{ user.role }}</td>
                <td>
                    <span class="badge {{ 'bg-success' if user.is_active else 'bg-danger' }}">
                        {{ 'Aktif' if user.is_active else 'Diblokir' }}
                    </span>
                </td>
                <td>
                    <form action="/admin/toggle_user/{{ user.username }}" method="POST">
                        <button type="submit" class="btn btn-sm btn-outline-warning">
                            Aktifkan/Blokir
                        </button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
